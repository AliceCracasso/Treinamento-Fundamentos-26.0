<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/login.css">
    <title>Login - Aperture Science Shop</title>
    
</head>
<body>
    <main class="container">
        <form id="login-form">
            <img class="logo" src="assets/imgs/aperturelogowhite.png" alt="Logo da Loja" width="350px">
            <div class="input-box">
                <input placeholder="E-mail" id="email" type="email">
            </div>
            <div class="input-box">
                <input placeholder="Password" id="password" type="password">
            </div>
            <button type="submit" id="login-button" class="login-button">Login</button>
        </form>
    </main>

    <script src="assets/js/index.js"></script>
</body>
</html>
